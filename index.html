<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat or Dog? Classifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
        <h1>Cat or Dog? AI Classifier</h1>
        <p>Upload a photo of your pet, and our AI will tell you if it's a cat or a dog!</p>
        
        <div class="upload-section">
            <input type="file" id="image-upload" accept="image/*" hidden>
            <label for="image-upload" class="upload-btn">Choose an Image</label>
        </div>

        <div id="image-container" class="image-container">
            <img id="preview-image" src="#" alt="Uploaded Image Preview" style="display: none;">
        </div>

        <div id="label-container" class="label-container">
            <!-- Classification results will appear here -->
        </div>

        <div id="loading" class="loading" style="display: none;">Analyzing...</div>

        <hr class="divider">

        <div class="contact-form">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xdavyeop" method="POST">
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>

        <hr class="divider">

        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-iq5nfolvzg.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <!-- TensorFlow.js and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
